<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — DEKNEK</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-glow"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <nav class="navbar"><a href="/" class="logo">DEKNEK</a><div class="nav-links"><a href="/signup.html">Sign up</a></div></nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your workspace</p>

      <div id="alert" class="alert"></div>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="login">Username or Email</label>
          <input type="text" id="login" name="login" class="form-input" placeholder="you@example.com" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">
          <span class="btn-text">Sign in</span><span class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">Don't have an account? <a href="/signup.html">Create one</a></div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = `alert ${type} show`;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading'); btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login: document.getElementById('login').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 600);
      } catch (err) {
        showAlert(err.message || 'Login failed', 'error');
        btn.classList.remove('loading'); btn.disabled = false;
      }
    });

    // Redirect if already logged in
    fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/dashboard.html'; });
  </script>
</body>
</html>
